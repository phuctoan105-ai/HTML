<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Document</title>
    <style>
        #a{
            width: 300px;
            height:50px;
            background-color:rgb(66, 46, 28);
            top:200px;
            left:200px;
            position: static;
        }
        #b{
            width: 300px;
            height:50px;
            background-color:rgb(96, 213, 221);
            top:20px;
            right:200px;
            position: fixed;
        }
        #c{
            width: 300px;
            height:50px;
            background-color:rgb(196, 226, 62);
            top:20px;
            right:400px;
            position: sticky;
        }
        #d{
            width: 300px;
            height:50px;
            background-color:rgb(199, 62, 226);
            top:200px;
            right:40px;
            position: relative;
        }
        #e{
            width: 300px;
            height:50px;
            background-color:rgb(118, 226, 108);
            top:200px;
            right:40px;
            position: absolute;
        }
    </style>
</head>
<body>
    <div id="a">Position: Static</div>
    <div id="b">Position: Fixed</div>
    <div id="c">Position: Sticky</div>
    <div id="d">Position: Relative</div>
    <div id="e">Position: Absolute</div>
