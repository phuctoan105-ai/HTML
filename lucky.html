<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        button{
            padding: 10px 15px;
            background-color: aquamarine;
            color:black;
            border:none;
            cursor:pointer;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;

        }
        button:hover{
            background-color:aqua;
        }
        #msg-name,
        #msg-guess{
            color:violet;
        }
        #result{
            color:rgb(127, 178, 255);
            font-weight:bold;
        }
        body{
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            background-color: antiquewhite;
            text-align: center;
            padding: 35px;
        }
        input{
            margin: 8px;
            width: 250px;
            padding: 8px;
        }
        #timer{
            color:brown;
        }
    </style>
</head>
<body>
    <h1 style="color:cornflowerblue">Lucky Draw</h1>
    <p>Test your luck by entering your name and number.</p>
    <input type="text" id="name" placeholder="Your name">
    <p id="msg-name"></p>

    <input type="number" id="guess" placeholder="Enter your guess a number between 1 to 5" min="1" max="5">
    <p id="msg-guess"></p>

    <button onclick="checkform()">Try my luck</button>
    <p id="result"></p>
    <p id="timer"></p>

    <script src="lucky.js"></script>

</body>
</html>
