<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <h2>The highest number is ...</h2>
</head>
<body bgcolor="blue">
    <p id="abc"></p>
    <script>
        function findMAX(){
            var a;
            var max=0
            for(a=0;a<arguments.length;a++){
                if(arguments[a]>max){
                    max=arguments[a];
                }
            }
            return max;
        }
        document.getElementById("abc").innerHTML=findMAX(2,3,4,5,26);
    </script>
    
</body>
</html>
