<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <link rel="stylesheet" href=

"https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<script src=

"https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

</script>
<style>
.col-sm-3,.col-sm-4,.col-sm-5{
background-color:darkblue;
border:5px solid white
}
.col-md-3,.col-md-4,.col-md-5{
background-color:rgb(0, 139, 12);
border:5px solid white
}
.col-lg-3,.col-lg-4,.col-lg-5{
background-color:rgb(139, 28, 0);
border:5px solid white
}
</style>

</head>
<body>
    <div class="container">
        <div class="row">
          <div class="col-sm-3">small 3 columns</div>
          <div class="col-sm-4">small 4 columns</div>
          <div class="col-sm-5">small 5 columns</div>  
        </div>
    </div>
    <div class="container">
        <div class="row">
          <div class="col-md-3">medium 3 columns</div>
          <div class="col-md-4">medium 4 columns</div>
          <div class="col-md-5">medium 5 columns</div>  
        </div>
    </div>
    <div class="container-fluid">
        <div class="row">
          <div class="col-lg-3">large 3 columns</div>
          <div class="col-lg-4">large 4 columns</div>
          <div class="col-lg-5">large 5 columns</div>  
        </div>
    </div>
    
</body>
</html>
