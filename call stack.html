<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Document</title>
</head>
<body>
    <p id="a"></p>
    <script>
        function add(a,b,c){
        return a+b+c;
        }
        function average(a,b,c){
            return add(a,b,c)/3;
        }
        let result=average(15,17,10);
        document.getElementById("a").innerHTML=result;

    </script>
</body>
</html>
