<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <button onclick="Myfunction()">Click here</button>
    <script>
        var a=8;
        
        function Myfunction(){
        var b=7;
        document.getElementById("demo").innerHTML=a*b;

        }
        document.getElementById("demo1").innerHTML=a;
        document.getElementById("demo2").innerHTML=b;
    </script>

</body>
</html>
