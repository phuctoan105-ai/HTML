<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Document</title>

</head>
<body>
    <p id="a"></p>
    <p id="b"></p>
    <p id="c"></p>
    <p id="d"></p>
    <p id="e"></p>
    <script>
        var a=6;
        var b=14;
        document.getElementById("a").innerHTML=a+b;
        document.getElementById("b").innerHTML=a-b;
        document.getElementById("c").innerHTML=a*b;
        document.getElementById("d").innerHTML=a/b;
        document.getElementById("e").innerHTML=a%b;
    </script>
        
</body>
</html>
